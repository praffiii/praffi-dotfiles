# Make colorschemes appear correctly
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Change prefix to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Make new windows start after current
bind c new-window -a -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"

# Vim-style splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Vim-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection
set -g allow-passthrough on
set -s set-clipboard on
setw -g mode-style 'fg=#1F1F28,bg=#7E9CD8'

# Start from window index 1
set -g base-index 1

# Automatically renumber-windows
set -g renumber-windows on

# Rename window to dir instead of process
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Styling of status line (sessions, windows, panes)
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=default'

set -g status-left-style 'fg=#1F1F28,bg=#957FB8,bold'
set -g status-left ' #S '
set -g status-left-length 20
set -g status-right ''

set -g pane-border-lines single
set -g pane-border-style 'fg=#54546D'
set -g pane-active-border-style 'fg=#957FB8'

setw -g window-status-separator ''
setw -g window-status-format '  #I:#W #F  '
setw -g window-status-style 'bg=default,fg=#C8C093'
setw -g window-status-current-format '  #I:#W #F  '
setw -g window-status-current-style 'bg=default,fg=#957FB8,bold'

# F12 nested session toggle
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=default,bg=#2D4F67" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Show [OFF] indicator when keys are off
set -g status-right '#([ $(tmux show-option -qv key-table) = "off" ] && echo " [OFF] ")'

# Window swapping
bind -r Left swap-window -t -1 \; select-window -t -1
bind -r Right swap-window -t +1 \; select-window -t +1

# Agent notifications
setw -g monitor-bell on
set -g bell-action other # only monitor bells in windows not currently open
setw -g window-status-bell-style 'fg=#C8C093 dotted-underscore'

# Correctly pass modified keys to processes running in tmux
set -g extended-keys on
set -g extended-keys-format csi-u
